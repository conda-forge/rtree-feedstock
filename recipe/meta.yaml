{% set name = "rtree" %}
{% set version = "1.4.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/rtree-{{ version }}.tar.gz
  sha256: c6b1b3550881e57ebe530cc6cffefc87cd9bf49c30b37b894065a9f810875e46
  patches:
    - noarch.patch

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61
    - wheel
    - pip
    - libspatialindex
  run:
    - python >={{ python_min }}
    - libspatialindex

test:
  imports:
    - rtree
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip
    - pytest
    - numpy
  source_files:
    - tests/

about:
  summary: R-Tree spatial index for Python GIS
  home: https://github.com/Toblerity/rtree
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - ocefpaf
    - hobu
    - mwtoews
