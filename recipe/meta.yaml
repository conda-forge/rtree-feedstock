{% set version = "1.0.1" %}

package:
  name: rtree
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/R/Rtree/Rtree-{{ version }}.tar.gz
  sha256: 222121699c303a64065d849bf7038b1ecabc37b65c7fa340bedb38ef0e805429

build:
  number: 0
  # libspatialindex isn't available on s390x
  skip: True  # [py<37 or (win and vc<14) or s390x]
  script: {{ PYTHON }} -m pip install . --no-deps -vv  # [not win]

requirements:
  host:
    - python
    - pip
    - libspatialindex
    - setuptools
    - wheel
  run:
    - python
    # https://github.com/Toblerity/rtree/blob/67991022577d5e7c50787380ccee211c846c74cc/DEPENDENCIES.txt#L3
    - libspatialindex >=1.8.5
    - typing_extensions >=3.7  # [py<38]

test:
  # Minimal test suite for PBP integration testing
  # This validates basic rtree + libspatialindex integration
  # without running the comprehensive test suite
  imports:
    - rtree
    - rtree.index
  commands:
    # Single smoke test command - validates C++ integration and basic functionality
    - python -c "from rtree import index; idx = index.Index(); idx.insert(1, (0, 0, 1, 1)); results = list(idx.intersection((0.5, 0.5, 1.5, 1.5))); assert 1 in results; print('✓ rtree + libspatialindex integration verified')"

about:
  home: https://github.com/Toblerity/rtree
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: R-Tree spatial index for Python GIS
  description: |
    Rtree is a ctypes Python wrapper of libspatialindex 
    that provides a number of advanced spatial indexing features for the spatially curious Python user. 
  dev_url: https://github.com/Toblerity/rtree
  doc_url: https://rtree.readthedocs.io/en/latest/

extra:
  recipe-maintainers:
    - ocefpaf
    - hobu
